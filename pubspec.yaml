name: kiosk_app
description: "Standalone multi-tenant kiosk app for masjids/organizations."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management + DI + routing (GetX modular layout)
  get: ^4.7.3

  # Local persistence for session, active org id, cached branding
  shared_preferences: ^2.3.5

  # Networking (centralized ApiClient)
  http: ^1.3.0

  # Typography (Poppins)
  google_fonts: ^6.3.3

  # Scan-to-Donate QR rendering
  qr_flutter: ^4.1.0

  # Shimmer loading placeholders
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Property-based testing
  glados: ^1.1.7

  # Recommended lints
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
